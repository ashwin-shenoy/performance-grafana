version: '3.9'

services:
  postgresql:
    image: postgres:15-alpine
    container_name: perf-platform-db
    environment:
      POSTGRES_USER: perfplatform
      POSTGRES_PASSWORD: changeme123
      POSTGRES_DB: perfplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perfplatform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-platform
    platform: linux/arm64

  influxdb:
    image: influxdb:2.7-alpine
    container_name: perf-platform-influxdb
    environment:
      INFLUXDB_DB: jmeter
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: changeme123
      DOCKER_INFLUXDB_INIT_ORG: perf-testing
      DOCKER_INFLUXDB_INIT_BUCKET: jmeter
      DOCKER_INFLUXDB_INIT_RETENTION: 720h
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: changeme123
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-platform
    platform: linux/arm64

  grafana:
    image: grafana/grafana:10.2.2
    container_name: perf-platform-grafana
    depends_on:
      - influxdb
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: changeme123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-platform
    platform: linux/arm64

  prometheus:
    image: prom/prometheus:latest
    container_name: perf-platform-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - perf-platform
    platform: linux/arm64

volumes:
  postgres-data:
  influxdb-data:
  grafana-data:
  prometheus-data:

networks:
  perf-platform:
    driver: bridge
