# ─────────────────────────────────────────────────────────────────────────────
# Sample App — e-commerce load-test target
# Pure Express.js service; no OpenTelemetry or Pyroscope dependencies.
# Endpoints: GET /health, GET /api/products, GET /api/products/:id,
#            GET /api/users/:id, POST /api/orders
# Realistic latency + ~5% error injection for load testing.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: perf-testing
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: image-registry.openshift-image-registry.svc:5000/perf-testing/perf-sample-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
          env:
            - name: PORT
              value: "3002"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: perf-testing
  labels:
    app: sample-app
spec:
  selector:
    app: sample-app
  ports:
    - name: http
      port: 3002
      targetPort: 3002
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: perf-sample-app
  namespace: perf-testing
  labels:
    app: sample-app
spec:
  to:
    kind: Service
    name: sample-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
