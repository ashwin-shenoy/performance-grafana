# ─────────────────────────────────────────────────────────────────────────────
# Sample App — load-test target with OTel tracing + Pyroscope profiling
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: perf-testing
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
    spec:
      containers:
        - name: sample-app
          image: image-registry.openshift-image-registry.svc:5000/perf-testing/perf-sample-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3002
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4318
            - name: OTEL_SERVICE_NAME
              value: sample-app
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=sample-app,service.version=1.0.0,deployment.environment=openshift"
            - name: PYROSCOPE_SERVER_ADDRESS
              value: http://pyroscope:4040
            - name: PYROSCOPE_APP_NAME
              value: sample-app
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: perf-testing
  labels:
    app: sample-app
spec:
  selector:
    app: sample-app
  ports:
    - name: http
      port: 3002
      targetPort: 3002
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: perf-sample-app
  namespace: perf-testing
  labels:
    app: sample-app
spec:
  to:
    kind: Service
    name: sample-app
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
