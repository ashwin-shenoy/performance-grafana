# ─────────────────────────────────────────────────────────────────────────────
# ConfigMaps — minimal stack
#
# Contains:
#   grafana-datasources        → InfluxDB-JMeter only (Flux query language)
#   grafana-dashboards-provider → loads JSON files from provisioning path
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: perf-testing
  labels:
    app: grafana
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
      # ── JMeter metrics via InfluxDB 2.x (Flux) ─────────────────────────────
      #
      # JMeter BackendListener writes to bucket "jmeter" under org "perf-testing"
      # using the built-in InfluxdbBackendListenerClient.
      #
      # Key tags on every data point:
      #   application  = workload_name slug  (set by -Jworkload_name at job launch)
      #   transaction  = sampler name | "all" (aggregate) | "internal" (VU count)
      #   statut       = "ok" | "ko" | "all"
      #
      # Key fields per sampler per ~1 s interval:
      #   avg, min, max, pct90.0, pct95.0, pct99.0   response times (ms)
      #   throughput, hit, count, countError           rates + counts
      #   rb, sb                                       received/sent bytes
      #
      # Internal (VU concurrency):
      #   transaction=internal  →  minAT, maxAT, meanAT, startedT, endedT
      #
      # Events (test start/stop annotations):
      #   measurement=events, tags: application, title, text, tags
      # ────────────────────────────────────────────────────────────────────────
      - name: InfluxDB-JMeter
        uid: influxdb-jmeter-ds
        type: influxdb
        access: proxy
        url: http://influxdb:8086
        isDefault: true
        editable: true
        jsonData:
          version:       Flux
          organization:  perf-testing
          defaultBucket: jmeter
          tlsSkipVerify: true
        secureJsonData:
          token: changeme123

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: perf-testing
  labels:
    app: grafana
data:
  dashboard.yml: |
    apiVersion: 1
    providers:
      - name: perf-platform
        orgId: 1
        folder: JMeter
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/json
          foldersFromFilesStructure: false
