# ─────────────────────────────────────────────────────────────────────────────
# Grafana — Deployment + Service + Route
# Runs as GID 472 → anyuid-perf SCC via perf-platform SA
#
# Provisioned automatically:
#   datasource  → grafana-datasources  ConfigMap (InfluxDB-JMeter, Flux)
#   dashboard   → grafana-dashboard-jmeter-perf ConfigMap (jmeter-perf.json)
#   provider    → grafana-dashboards-provider ConfigMap
#
# GF_SERVER_ROOT_URL is set to "https://grafana.APPS_DOMAIN"; deploy scripts
# replace APPS_DOMAIN with the real cluster wildcard via sed before applying.
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: perf-testing
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: perf-platform
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: grafana-secret
          env:
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /etc/grafana/provisioning/dashboards/json/jmeter-perf.json
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.APPS_DOMAIN"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-json-jmeter-perf
              mountPath: /etc/grafana/provisioning/dashboards/json/jmeter-perf.json
              subPath: jmeter-perf.json
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards-json-jmeter-perf
          configMap:
            name: grafana-dashboard-jmeter-perf

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: perf-testing
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: perf-testing
  labels:
    app: grafana
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
