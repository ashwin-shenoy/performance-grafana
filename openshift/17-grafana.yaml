# ─────────────────────────────────────────────────────────────────────────────
# Grafana — Deployment + Service + Route
# Runs as GID 472 → anyuid-perf SCC via perf-platform SA
# Dashboard JSON ConfigMaps are created by deploy.sh and mounted here
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: perf-testing
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: perf-platform
      securityContext:
        fsGroup: 472
        runAsUser: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: grafana-secret
          env:
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_INSTALL_PLUGINS
              value: grafana-piechart-panel
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "traceqlEditor traceQLStreaming metricsSummary"
            - name: GF_UNIFIED_ALERTING_ENABLED
              value: "true"
            - name: GF_ALERTING_ENABLED
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.APPS_DOMAIN"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: alerting
              mountPath: /etc/grafana/provisioning/alerting
            - name: dashboards-json-01
              mountPath: /etc/grafana/provisioning/dashboards/json/01-active-test-monitor.json
              subPath: 01-active-test-monitor.json
            - name: dashboards-json-02
              mountPath: /etc/grafana/provisioning/dashboards/json/02-run-comparison.json
              subPath: 02-run-comparison.json
            - name: dashboards-json-03
              mountPath: /etc/grafana/provisioning/dashboards/json/03-slo-tracker.json
              subPath: 03-slo-tracker.json
            - name: dashboards-json-04
              mountPath: /etc/grafana/provisioning/dashboards/json/04-historical-trends.json
              subPath: 04-historical-trends.json
            - name: dashboards-json-05
              mountPath: /etc/grafana/provisioning/dashboards/json/05-correlation-view.json
              subPath: 05-correlation-view.json
            - name: dashboards-json-06
              mountPath: /etc/grafana/provisioning/dashboards/json/06-regression-tracker.json
              subPath: 06-regression-tracker.json
            - name: dashboards-json-07
              mountPath: /etc/grafana/provisioning/dashboards/json/07-executive-summary.json
              subPath: 07-executive-summary.json
            - name: dashboards-json-legacy
              mountPath: /etc/grafana/provisioning/dashboards/json/jmeter-load-test.json
              subPath: jmeter-load-test.json
            - name: dashboards-json-obs
              mountPath: /etc/grafana/provisioning/dashboards/json/observability.json
              subPath: observability.json
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: alerting
          configMap:
            name: grafana-alerting
        - name: dashboards-json-01
          configMap:
            name: grafana-dashboard-01
        - name: dashboards-json-02
          configMap:
            name: grafana-dashboard-02
        - name: dashboards-json-03
          configMap:
            name: grafana-dashboard-03
        - name: dashboards-json-04
          configMap:
            name: grafana-dashboard-04
        - name: dashboards-json-05
          configMap:
            name: grafana-dashboard-05
        - name: dashboards-json-06
          configMap:
            name: grafana-dashboard-06
        - name: dashboards-json-07
          configMap:
            name: grafana-dashboard-07
        - name: dashboards-json-legacy
          configMap:
            name: grafana-dashboard-legacy
        - name: dashboards-json-obs
          configMap:
            name: grafana-dashboard-observability

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: perf-testing
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: perf-testing
  labels:
    app: grafana
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
