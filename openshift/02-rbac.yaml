# ─────────────────────────────────────────────────────────────────────────────
# Service Accounts & RBAC
# ─────────────────────────────────────────────────────────────────────────────

# ── perf-platform SA: used by Grafana, InfluxDB, PostgreSQL (anyuid SCC) ─────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: perf-platform
  namespace: perf-testing
  labels:
    app.kubernetes.io/managed-by: perf-platform

# ── jmeter-orchestrator SA: used by the API to create JMeter Jobs ────────────
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jmeter-orchestrator
  namespace: perf-testing
  labels:
    app.kubernetes.io/managed-by: perf-platform

# ── Role: jmeter-orchestrator can manage Jobs and Pods ───────────────────────
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jmeter-orchestrator
  namespace: perf-testing
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jmeter-orchestrator
  namespace: perf-testing
subjects:
  - kind: ServiceAccount
    name: jmeter-orchestrator
    namespace: perf-testing
  - kind: ServiceAccount
    name: perf-platform
    namespace: perf-testing
roleRef:
  kind: Role
  name: jmeter-orchestrator
  apiGroup: rbac.authorization.k8s.io

# ── SCC binding: anyuid-perf → perf-platform SA ───────────────────────────────
# Required for PostgreSQL (uid 999), Grafana (uid 472), InfluxDB (uid 1000)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: anyuid-perf-platform
subjects:
  - kind: ServiceAccount
    name: perf-platform
    namespace: perf-testing
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid-perf
  apiGroup: rbac.authorization.k8s.io
