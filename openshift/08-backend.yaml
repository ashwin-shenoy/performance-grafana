# ─────────────────────────────────────────────────────────────────────────────
# Backend API — Deployment + Service + Route
# Image built from ./backend via OpenShift BuildConfig (see deploy.sh)
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: perf-testing
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: jmeter-orchestrator
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/perf-testing/perf-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: perfplatform
            - name: KUBE_NAMESPACE
              value: perf-testing
            - name: JMETER_IMAGE
              value: image-registry.openshift-image-registry.svc:5000/perf-testing/perf-jmeter:latest
            - name: RESULTS_PATH
              value: /report
            - name: LOG_LEVEL
              value: info
            - name: LOCAL_MODE
              value: "false"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: jmeter-results
              mountPath: /report
      volumes:
        - name: jmeter-results
          persistentVolumeClaim:
            claimName: jmeter-results-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: perf-testing
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: perf-api
  namespace: perf-testing
  labels:
    app: backend
spec:
  to:
    kind: Service
    name: backend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
