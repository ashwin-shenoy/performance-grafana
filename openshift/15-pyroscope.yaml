# ─────────────────────────────────────────────────────────────────────────────
# Pyroscope — Continuous Profiling Backend
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: perf-testing
  labels:
    app: pyroscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      serviceAccountName: perf-platform
      securityContext:
        fsGroup: 10001
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.3.0
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --storage.path=/data
          ports:
            - name: http
              containerPort: 4040
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: 4040
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 4040
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pyroscope-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: perf-testing
  labels:
    app: pyroscope
spec:
  selector:
    app: pyroscope
  ports:
    - name: http
      port: 4040
      targetPort: 4040
  type: ClusterIP
