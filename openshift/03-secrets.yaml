data:
  # perfplatform
  POSTGRES_USER: cGVyZnBsYXRmb3Jt
  # changeme123
  POSTGRES_PASSWORD: Y2hhbmdlbWUxMjM=
  # perfplatform
  POSTGRES_DB: cGVyZnBsYXRmb3Jt
  # postgresql://perfplatform:changeme123@postgresql:5432/perfplatform
  DATABASE_URL: cG9zdGdyZXNxbDovL3BlcmZwbGF0Zm9ybTpjaGFuZ2VtZTEyM0Bwb3N0Z3Jlc3FsOjU0MzIvcGVyZnBsYXRmb3Jt

