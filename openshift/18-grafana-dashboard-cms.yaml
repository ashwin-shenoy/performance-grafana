data:
  observability.json: "{\n  \"uid\": \"observability-overview\",\n  \"title\": \"Observability \\u2014 Logs \\u00b7 Traces \\u00b7 Profiles\",\n  \"description\": \"Unified view: Loki logs, Tempo traces, and Pyroscope CPU profiles for the sample-app\",\n  \"tags\": [\n    \"observability\",\n    \"loki\",\n    \"tempo\",\n    \"pyroscope\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"10s\",\n  \"time\": {\n    \"from\": \"now-30m\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"title\": \"\\ud83d\\udccb Logs\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"id\": 100,\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Log Volume\",\n      \"description\": \"Total log lines ingested in selected window\",\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"id\": 1,\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"sum\"\n          ],\n          \"fields\": \"\",\n          \"values\": false\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"area\",\n        \"justifyMode\": \"center\",\n        \"textMode\": \"auto\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          },\n          \"unit\": \"short\"\n        }\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"sum(count_over_time({service=\\\"sample-app\\\"}[$__range]))\",\n          \"queryType\": \"instant\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Error Logs\",\n      \"description\": \"Log lines with level=error\",\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 4,\n        \"y\": 1\n      },\n      \"id\": 2,\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"sum\"\n          ],\n          \"fields\": \"\",\n          \"values\": false\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"area\",\n        \"justifyMode\": \"center\",\n        \"textMode\": \"auto\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 10\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 50\n              }\n            ]\n          },\n          \"unit\": \"short\"\n        }\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"sum(count_over_time({service=\\\"sample-app\\\", level=\\\"error\\\"}[$__range]))\",\n          \"queryType\": \"instant\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Log Rate by Level\",\n      \"description\": \"Logs/s broken down by level (info, warn, error)\",\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 16,\n        \"x\": 8,\n        \"y\": 1\n      },\n      \"id\": 3,\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"none\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          },\n          \"unit\": \"reqps\"\n        }\n      },\n      \"targets\": [\n        {\n          \"refId\": \"info\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"sum(rate({service=\\\"sample-app\\\", level=\\\"info\\\"}[$__rate_interval]))\",\n          \"legendFormat\": \"info\"\n        },\n        {\n          \"refId\": \"warn\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"sum(rate({service=\\\"sample-app\\\", level=\\\"warn\\\"}[$__rate_interval]))\",\n          \"legendFormat\": \"warn\"\n        },\n        {\n          \"refId\": \"error\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"sum(rate({service=\\\"sample-app\\\", level=\\\"error\\\"}[$__rate_interval]))\",\n          \"legendFormat\": \"error\"\n        }\n      ]\n    },\n    {\n      \"type\": \"logs\",\n      \"title\": \"Live Logs \\u2014 sample-app\",\n      \"description\": \"Structured JSON log stream. Click the TraceID link to jump to the trace in Tempo.\",\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 12,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 9\n      },\n      \"id\": 4,\n      \"options\": {\n        \"showTime\": true,\n        \"showLabels\": false,\n        \"showCommonLabels\": true,\n        \"wrapLogMessage\": false,\n        \"prettifyLogMessage\": true,\n        \"enableLogDetails\": true,\n        \"dedupStrategy\": \"none\",\n        \"sortOrder\": \"Descending\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"{service=\\\"sample-app\\\"} | json\",\n          \"queryType\": \"range\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"title\": \"\\ud83d\\udd0d Traces\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 21\n      },\n      \"id\": 200,\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"Span Rate\",\n      \"description\": \"Spans/s generated by sample-app\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 0,\n        \"y\": 22\n      },\n      \"id\": 5,\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ],\n          \"fields\": \"\",\n          \"values\": false\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"area\",\n        \"justifyMode\": \"center\",\n        \"textMode\": \"auto\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          },\n          \"unit\": \"reqps\"\n        }\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(traces_spanmetrics_calls_total{service=\\\"sample-app\\\"}[1m]))\",\n          \"legendFormat\": \"spans/s\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"title\": \"P95 Latency (traces)\",\n      \"description\": \"P95 end-to-end latency from span metrics\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 4,\n        \"y\": 22\n      },\n      \"id\": 6,\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ],\n          \"fields\": \"\",\n          \"values\": false\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"area\",\n        \"justifyMode\": \"center\",\n        \"textMode\": \"auto\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 300\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 1000\n              }\n            ]\n          },\n          \"unit\": \"ms\"\n        }\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"histogram_quantile(0.95, sum(rate(traces_spanmetrics_duration_milliseconds_bucket{service=\\\"sample-app\\\"}[2m])) by (le)) * 1000\",\n          \"legendFormat\": \"P95\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Span Metrics \\u2014 Rate & Error Rate\",\n      \"description\": \"From Tempo's span-metrics pipeline (populated after running a load test)\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 16,\n        \"x\": 8,\n        \"y\": 22\n      },\n      \"id\": 7,\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          },\n          \"unit\": \"reqps\"\n        }\n      },\n      \"targets\": [\n        {\n          \"refId\": \"rate\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(traces_spanmetrics_calls_total{service=\\\"sample-app\\\"}[$__rate_interval])) by (span_name)\",\n          \"legendFormat\": \"{{span_name}}\"\n        }\n      ]\n    },\n    {\n      \"type\": \"nodeGraph\",\n      \"title\": \"Service Map\",\n      \"description\": \"Auto-generated service dependency graph from Tempo's service-graph processor\",\n      \"datasource\": {\n        \"type\": \"tempo\",\n        \"uid\": \"tempo-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 12,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 30\n      },\n      \"id\": 8,\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"tempo\",\n            \"uid\": \"tempo-ds\"\n          },\n          \"queryType\": \"serviceMap\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"title\": \"\\ud83d\\udd25 Profiles (Pyroscope)\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 42\n      },\n      \"id\": 300,\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"flamegraph\",\n      \"title\": \"Wall-Time Flame Graph \\u2014 sample-app\",\n      \"description\": \"Continuous wall-time profiling via Pyroscope (Node.js). Run a load test to see hot paths.\",\n      \"datasource\": {\n        \"type\": \"grafana-pyroscope-datasource\",\n        \"uid\": \"pyroscope-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 16,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 43\n      },\n      \"id\": 9,\n      \"options\": {\n        \"collapsing\": false\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"grafana-pyroscope-datasource\",\n            \"uid\": \"pyroscope-ds\"\n          },\n          \"profileTypeId\": \"wall:samples:count:wall:nanoseconds\",\n          \"labelSelector\": \"{service_name=\\\"sample-app\\\"}\",\n          \"queryType\": \"profile\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"title\": \"Wall-Time Profile Rate \\u2014 sample-app\",\n      \"description\": \"Wall-time samples over time (Node.js wall profiler)\",\n      \"datasource\": {\n        \"type\": \"grafana-pyroscope-datasource\",\n        \"uid\": \"pyroscope-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 59\n      },\n      \"id\": 10,\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          },\n          \"unit\": \"short\"\n        }\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"grafana-pyroscope-datasource\",\n            \"uid\": \"pyroscope-ds\"\n          },\n          \"profileTypeId\": \"wall:samples:count:wall:nanoseconds\",\n          \"labelSelector\": \"{service_name=\\\"sample-app\\\"}\",\n          \"queryType\": \"metrics\",\n          \"groupBy\": [\n            \"service_name\"\n          ]\n        }\n      ]\n    }\n  ]\n}"
kind: ConfigMap
metadata:
  labels:
    app: grafana
  name: grafana-dashboard-observability
  namespace: perf-testing
---
apiVersion: v1
data:
  performance-alerts.yaml: "apiVersion: 1\n\ngroups:\n  - orgId: 1\n    name: performance_degradation\n    folder: Alerts\n    interval: 1m\n    rules:\n\n      - uid: perf-error-rate-spike\n        title: \"Error Rate Spike\"\n        condition: C\n        data:\n          - refId: A\n            relativeTimeRange: {from: 300, to: 0}\n            datasourceUid: prometheus-ds\n            model:\n              expr: |\n                100 * sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[2m]))\n                / sum(rate(http_server_requests_seconds_count[2m]))\n              refId: A\n          - refId: B\n            relativeTimeRange: {from: 300, to: 0}\n            datasourceUid: \"__expr__\"\n            model: {type: reduce, refId: B, reducer: last, expression: A}\n          - refId: C\n            relativeTimeRange: {from: 300, to: 0}\n            datasourceUid: \"__expr__\"\n            model:\n              type: threshold\n              refId: C\n              expression: B\n              conditions:\n                - evaluator: {params: [1.0], type: gt}\n                  operator: {type: and}\n        noDataState: OK\n        execErrState: OK\n        for: 2m\n        annotations:\n          summary: \"Error rate exceeds 1% SLO threshold\"\n          description: \"sample-app error rate has exceeded 1% for 2 consecutive minutes.\"\n        labels:\n          severity: critical\n          service: sample-app\n\n      - uid: perf-p95-latency-breach\n        title: \"P95 Latency SLO Breach\"\n        condition: C\n        data:\n          - refId: A\n            relativeTimeRange: {from: 300, to: 0}\n            datasourceUid: prometheus-ds\n            model:\n              expr: |\n                histogram_quantile(0.95,\n                  sum(rate(http_server_requests_seconds_bucket[3m])) by (le)\n                ) * 1000\n              refId: A\n          - refId: B\n            relativeTimeRange: {from: 300, to: 0}\n            datasourceUid: \"__expr__\"\n            model: {type: reduce, refId: B, reducer: last, expression: A}\n          - refId: C\n            relativeTimeRange: {from: 300, to: 0}\n            datasourceUid: \"__expr__\"\n            model:\n              type: threshold\n              refId: C\n              expression: B\n              conditions:\n                - evaluator: {params: [200], type: gt}\n                  operator: {type: and}\n        noDataState: OK\n        execErrState: OK\n        for: 3m\n        annotations:\n          summary: \"P95 latency exceeds 200ms SLO\"\n          description: \"P95 response time has exceeded the 200ms SLO for 3 consecutive minutes.\"\n        labels:\n          severity: critical\n\n      - uid: perf-regression-detected\n        title: \"Performance Regression Detected\"\n        condition: C\n        data:\n          - refId: A\n            relativeTimeRange: {from: 900, to: 0}\n            datasourceUid: postgres-ds\n            model:\n              rawSql: |\n                SELECT NOW() AS time,\n                       COUNT(*) AS value\n                FROM regression_events\n                WHERE detected_at > NOW() - INTERVAL '15 minutes'\n                  AND acknowledged  = false\n                  AND false_positive = false\n                  AND severity = 'critical'\n              format: time_series\n              refId: A\n          - refId: B\n            relativeTimeRange: {from: 900, to: 0}\n            datasourceUid: \"__expr__\"\n            model: {type: reduce, refId: B, reducer: last, expression: A}\n          - refId: C\n            relativeTimeRange: {from: 900, to: 0}\n            datasourceUid: \"__expr__\"\n            model:\n              type: threshold\n              refId: C\n              expression: B\n              conditions:\n                - evaluator: {params: [0], type: gt}\n                  operator: {type: and}\n        noDataState: OK\n        execErrState: OK\n        for: 0s\n        annotations:\n          summary: \"Critical performance regression(s) detected in the last 15 minutes\"\n          description: \"Automatic regression detection found regressions vs baseline. Check the Regression Tracker dashboard.\"\n        labels:\n          severity: warning\n\ncontactPoints:\n  - orgId: 1\n    name: perf-platform-default\n    receivers:\n      - uid: perf-default-receiver\n        type: email\n        settings:\n          addresses: perf-team@example.com\n          subject: \"[PERF ALERT] {{ .GroupLabels.alertname }}\"\n        disableResolveMessage: false\n\npolicies:\n  - orgId: 1\n    receiver: perf-platform-default\n    group_by: [\"alertname\", \"service\"]\n    group_wait: 30s\n    group_interval: 5m\n    repeat_interval: 4h\n"
kind: ConfigMap
metadata:
  labels:
    app: grafana
  name: grafana-alerting
  namespace: perf-testing
