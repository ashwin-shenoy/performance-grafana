  01-active-test-monitor.json: "{\n  \"uid\": \"perf-active-monitor\",\n  \"title\": \"\\ud83d\\udd34 Active Test Monitor\",\n  \"description\": \"Real-time load test monitoring with SLO tracking and infrastructure correlation\",\n  \"tags\": [\n    \"performance\",\n    \"real-time\",\n    \"active\",\n    \"slo\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"5s\",\n  \"time\": {\n    \"from\": \"now-30m\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"environment\",\n        \"label\": \"Environment\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT name FROM environments ORDER BY name\",\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {\n          \"text\": \"staging\",\n          \"value\": \"staging\"\n        },\n        \"hide\": 0\n      },\n      {\n        \"name\": \"service\",\n        \"label\": \"Service\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT DISTINCT service FROM test_plans WHERE service IS NOT NULL ORDER BY service\",\n        \"refresh\": 2,\n        \"current\": {\n          \"text\": \"sample-app\",\n          \"value\": \"sample-app\"\n        },\n        \"hide\": 0\n      },\n      {\n        \"name\": \"run_id\",\n        \"label\": \"Test Run\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT run_id||' | '||test_name||' | '||status||' | '||to_char(started_at,'MM-DD HH24:MI') AS __text, run_id AS __value FROM test_runs WHERE environment='$environment' AND service='$service' ORDER BY started_at DESC LIMIT 30\",\n        \"refresh\": 1,\n        \"hide\": 0\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"id\": 100,\n      \"title\": \"\\u26a1 Live Test Metrics\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 1,\n      \"title\": \"Test Status\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          },\n          \"mappings\": [\n            {\n              \"type\": \"value\",\n              \"options\": {\n                \"RUNNING\": {\n                  \"text\": \"\\ud83d\\udd34 RUNNING\",\n                  \"color\": \"orange\",\n                  \"index\": 0\n                },\n                \"COMPLETED\": {\n                  \"text\": \"\\u2705 PASSED\",\n                  \"color\": \"green\",\n                  \"index\": 1\n                },\n                \"FAILED\": {\n                  \"text\": \"\\u274c FAILED\",\n                  \"color\": \"red\",\n                  \"index\": 2\n                }\n              }\n            }\n          ]\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT status FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 2,\n      \"title\": \"Duration\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 3,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"value\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"s\",\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"blue\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COALESCE(duration_s, EXTRACT(EPOCH FROM (NOW()-started_at))::INT) FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 3,\n      \"title\": \"Peak RPS\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 6,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"reqps\",\n          \"decimals\": 1,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 100\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 500\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT peak_rps FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 4,\n      \"title\": \"P95 Latency\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 9,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"decimals\": 0,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 150\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 200\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT p95_ms FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 5,\n      \"title\": \"P99 Latency\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 12,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"decimals\": 0,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 300\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 500\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT p99_ms FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 6,\n      \"title\": \"Error Rate\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 15,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"decimals\": 2,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 0.5\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 1.0\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT error_rate_pct FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 7,\n      \"title\": \"Total Requests\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 18,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"value\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"purple\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT total_requests FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 8,\n      \"title\": \"SLOs Passed\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 3,\n        \"x\": 21,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 1\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT passed_slos::text||'/'||(passed_slos+failed_slos)::text FROM test_runs WHERE run_id='$run_id' LIMIT 1\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 101,\n      \"title\": \"\\ud83d\\udcc8 Real-Time Application Metrics (Prometheus)\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 4\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 10,\n      \"title\": \"Throughput (req/s)\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 5\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"desc\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\",\n          \"calcs\": [\n            \"mean\",\n            \"max\",\n            \"last\"\n          ]\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"reqps\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(http_server_requests_seconds_count[$__rate_interval]))\",\n          \"legendFormat\": \"Throughput (rps)\"\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(http_server_requests_seconds_count{status=~'5..'}[$__rate_interval]))\",\n          \"legendFormat\": \"Errors (rps)\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 11,\n      \"title\": \"Response Time Percentiles (ms)\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 5\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"desc\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\",\n          \"calcs\": [\n            \"mean\",\n            \"max\",\n            \"last\"\n          ]\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 5\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"P50\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"green\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"P95\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"yellow\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"P99\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"histogram_quantile(0.50, sum(rate(http_server_requests_seconds_bucket[$__rate_interval])) by (le)) * 1000\",\n          \"legendFormat\": \"P50\"\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[$__rate_interval])) by (le)) * 1000\",\n          \"legendFormat\": \"P95\"\n        },\n        {\n          \"refId\": \"C\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[$__rate_interval])) by (le)) * 1000\",\n          \"legendFormat\": \"P99\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 12,\n      \"title\": \"Error Rate %\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 13\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 20\n          },\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"red\"\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"100 * sum(rate(http_server_requests_seconds_count{status=~'5..'}[$__rate_interval])) / sum(rate(http_server_requests_seconds_count[$__rate_interval]))\",\n          \"legendFormat\": \"Error %\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 13,\n      \"title\": \"Latency by Endpoint\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 13\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"desc\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 5\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[$__rate_interval])) by (le, uri)) * 1000\",\n          \"legendFormat\": \"P95 {{uri}}\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 14,\n      \"title\": \"Throughput by Endpoint\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 8,\n        \"x\": 16,\n        \"y\": 13\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\",\n          \"sort\": \"desc\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"reqps\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 5\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(http_server_requests_seconds_count[$__rate_interval])) by (uri)\",\n          \"legendFormat\": \"{{uri}}\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 102,\n      \"title\": \"\\ud83c\\udfd7\\ufe0f Infrastructure Correlation\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 18\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 15,\n      \"title\": \"CPU %\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 6,\n        \"x\": 0,\n        \"y\": 19\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 20\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 70\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 90\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"100 - (avg by(instance)(rate(node_cpu_seconds_total{mode='idle'}[$__rate_interval])) * 100)\",\n          \"legendFormat\": \"CPU\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 16,\n      \"title\": \"Memory %\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 6,\n        \"x\": 6,\n        \"y\": 19\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 20\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 75\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 90\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"100*(1-(node_memory_MemAvailable_bytes/node_memory_MemTotal_bytes))\",\n          \"legendFormat\": \"Memory\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 17,\n      \"title\": \"Network I/O\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 6,\n        \"x\": 12,\n        \"y\": 19\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"Bps\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(node_network_receive_bytes_total[$__rate_interval]))\",\n          \"legendFormat\": \"RX\"\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(node_network_transmit_bytes_total[$__rate_interval]))\",\n          \"legendFormat\": \"TX\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 18,\n      \"title\": \"Process Memory\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 6,\n        \"x\": 18,\n        \"y\": 19\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"bytes\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"process_resident_memory_bytes\",\n          \"legendFormat\": \"RSS {{job}}\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 103,\n      \"title\": \"\\ud83d\\udccb SLO Status & Live Logs\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 24\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 20,\n      \"title\": \"SLO Compliance \\u2014 This Run\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 14,\n        \"x\": 0,\n        \"y\": 25\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Passed\",\n            \"desc\": false\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Passed\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"true\": {\n                        \"text\": \"\\u2705 PASS\",\n                        \"color\": \"green\",\n                        \"index\": 0\n                      },\n                      \"false\": {\n                        \"text\": \"\\u274c FAIL\",\n                        \"color\": \"red\",\n                        \"index\": 1\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Severity\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"critical\": {\n                        \"color\": \"red\",\n                        \"index\": 0\n                      },\n                      \"warning\": {\n                        \"color\": \"yellow\",\n                        \"index\": 1\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT sd.metric_name AS \\\"SLO\\\", sd.threshold AS \\\"Target\\\", sd.unit AS \\\"Unit\\\", ROUND(sr.actual_value::NUMERIC,2) AS \\\"Actual\\\", sr.passed::text AS \\\"Passed\\\", sd.severity AS \\\"Severity\\\" FROM slo_results sr JOIN slo_definitions sd ON sd.id=sr.slo_id JOIN test_runs tr ON tr.execution_id=sr.execution_id WHERE tr.run_id='$run_id' ORDER BY sr.passed ASC, sd.severity DESC\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"logs\",\n      \"id\": 21,\n      \"title\": \"Live Error Logs (Loki)\",\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 10,\n        \"x\": 14,\n        \"y\": 25\n      },\n      \"options\": {\n        \"showTime\": true,\n        \"showLabels\": false,\n        \"showCommonLabels\": true,\n        \"wrapLogMessage\": false,\n        \"prettifyLogMessage\": true,\n        \"enableLogDetails\": true,\n        \"dedupStrategy\": \"none\",\n        \"sortOrder\": \"Descending\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"{service=\\\"sample-app\\\",level=\\\"error\\\"} | json\",\n          \"queryType\": \"range\"\n        }\n      ]\n    }\n  ]\n}"
kind: ConfigMap
metadata:
  labels:
    app: grafana
  name: grafana-dashboard-01
  namespace: perf-testing
---
apiVersion: v1
data:
  02-run-comparison.json: "{\n  \"uid\": \"perf-run-comparison\",\n  \"title\": \"\\ud83d\\udd0d Test Run Comparison\",\n  \"description\": \"Side-by-side comparison of two test runs with delta analysis and regression detection\",\n  \"tags\": [\n    \"performance\",\n    \"comparison\",\n    \"regression\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"30s\",\n  \"time\": {\n    \"from\": \"now-24h\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"environment\",\n        \"label\": \"Environment\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT name FROM environments ORDER BY name\",\n        \"refresh\": 2,\n        \"current\": {\n          \"text\": \"staging\",\n          \"value\": \"staging\"\n        }\n      },\n      {\n        \"name\": \"service\",\n        \"label\": \"Service\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT DISTINCT service FROM test_plans WHERE service IS NOT NULL ORDER BY service\",\n        \"refresh\": 2,\n        \"current\": {\n          \"text\": \"sample-app\",\n          \"value\": \"sample-app\"\n        }\n      },\n      {\n        \"name\": \"run_id\",\n        \"label\": \"Current Run\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT run_id||' | '||test_name||' | '||status||' | '||to_char(started_at,'MM-DD HH24:MI') AS __text, run_id AS __value FROM test_runs WHERE environment='$environment' AND service='$service' ORDER BY started_at DESC LIMIT 30\",\n        \"refresh\": 1\n      },\n      {\n        \"name\": \"compare_id\",\n        \"label\": \"Baseline Run\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT run_id||' | '||test_name||' | '||status||' | '||to_char(started_at,'MM-DD HH24:MI') AS __text, run_id AS __value FROM test_runs WHERE environment='$environment' AND service='$service' AND run_id!='$run_id' ORDER BY started_at DESC LIMIT 30\",\n        \"refresh\": 1\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"id\": 100,\n      \"title\": \"\\ud83d\\udcca Metric Delta: Current vs Baseline\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 1,\n      \"title\": \"Side-by-Side Metric Comparison\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 10,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Delta %\",\n            \"desc\": true\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Status\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.width\",\n                \"value\": 130\n              },\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"\\u2705 OK\": {\n                        \"color\": \"green\",\n                        \"index\": 0\n                      },\n                      \"\\u26a0\\ufe0f WARNING\": {\n                        \"color\": \"yellow\",\n                        \"index\": 1\n                      },\n                      \"\\u274c CRITICAL\": {\n                        \"color\": \"red\",\n                        \"index\": 2\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Delta %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"unit\",\n                \"value\": \"percent\"\n              },\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 10\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 25\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Current\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.width\",\n                \"value\": 110\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Baseline\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.width\",\n                \"value\": 110\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"WITH curr AS (SELECT * FROM test_runs WHERE run_id='$run_id' LIMIT 1),\\n  base AS (SELECT * FROM test_runs WHERE run_id='$compare_id' LIMIT 1)\\nSELECT 'P50 Latency (ms)' AS \\\"Metric\\\",\\n       ROUND(curr.p50_ms::NUMERIC,1) AS \\\"Current\\\",\\n       ROUND(base.p50_ms::NUMERIC,1) AS \\\"Baseline\\\",\\n       ROUND(((curr.p50_ms-base.p50_ms)/NULLIF(base.p50_ms,0)*100)::NUMERIC,1) AS \\\"Delta %\\\",\\n       CASE WHEN ((curr.p50_ms-base.p50_ms)/NULLIF(base.p50_ms,0)*100) > 25 THEN '\\u274c CRITICAL'\\n            WHEN ((curr.p50_ms-base.p50_ms)/NULLIF(base.p50_ms,0)*100) > 10 THEN '\\u26a0\\ufe0f WARNING'\\n            ELSE '\\u2705 OK' END AS \\\"Status\\\"\\nFROM curr,base\\nUNION ALL\\nSELECT 'P95 Latency (ms)',\\n       ROUND(curr.p95_ms::NUMERIC,1), ROUND(base.p95_ms::NUMERIC,1),\\n       ROUND(((curr.p95_ms-base.p95_ms)/NULLIF(base.p95_ms,0)*100)::NUMERIC,1),\\n       CASE WHEN ((curr.p95_ms-base.p95_ms)/NULLIF(base.p95_ms,0)*100) > 25 THEN '\\u274c CRITICAL'\\n            WHEN ((curr.p95_ms-base.p95_ms)/NULLIF(base.p95_ms,0)*100) > 10 THEN '\\u26a0\\ufe0f WARNING'\\n            ELSE '\\u2705 OK' END\\nFROM curr,base\\nUNION ALL\\nSELECT 'P99 Latency (ms)',\\n       ROUND(curr.p99_ms::NUMERIC,1), ROUND(base.p99_ms::NUMERIC,1),\\n       ROUND(((curr.p99_ms-base.p99_ms)/NULLIF(base.p99_ms,0)*100)::NUMERIC,1),\\n       CASE WHEN ((curr.p99_ms-base.p99_ms)/NULLIF(base.p99_ms,0)*100) > 30 THEN '\\u274c CRITICAL'\\n            WHEN ((curr.p99_ms-base.p99_ms)/NULLIF(base.p99_ms,0)*100) > 15 THEN '\\u26a0\\ufe0f WARNING'\\n            ELSE '\\u2705 OK' END\\nFROM curr,base\\nUNION ALL\\nSELECT 'Error Rate (%)',\\n       ROUND(curr.error_rate_pct::NUMERIC,3), ROUND(base.error_rate_pct::NUMERIC,3),\\n       ROUND(((curr.error_rate_pct-base.error_rate_pct)/NULLIF(base.error_rate_pct,0.001)*100)::NUMERIC,1),\\n       CASE WHEN curr.error_rate_pct > 1 THEN '\\u274c CRITICAL'\\n            WHEN curr.error_rate_pct > 0.5 THEN '\\u26a0\\ufe0f WARNING'\\n            ELSE '\\u2705 OK' END\\nFROM curr,base\\nUNION ALL\\nSELECT 'Peak RPS',\\n       ROUND(curr.peak_rps::NUMERIC,1), ROUND(base.peak_rps::NUMERIC,1),\\n       ROUND(((curr.peak_rps-base.peak_rps)/NULLIF(base.peak_rps,0)*100)::NUMERIC,1),\\n       CASE WHEN ((base.peak_rps-curr.peak_rps)/NULLIF(base.peak_rps,0)*100) > 20 THEN '\\u274c CRITICAL'\\n            WHEN ((base.peak_rps-curr.peak_rps)/NULLIF(base.peak_rps,0)*100) > 10 THEN '\\u26a0\\ufe0f WARNING'\\n            ELSE '\\u2705 OK' END\\nFROM curr,base\\nUNION ALL\\nSELECT 'Avg RPS',\\n       ROUND(curr.avg_rps::NUMERIC,1), ROUND(base.avg_rps::NUMERIC,1),\\n       ROUND(((curr.avg_rps-base.avg_rps)/NULLIF(base.avg_rps,0)*100)::NUMERIC,1),\\n       CASE WHEN ((base.avg_rps-curr.avg_rps)/NULLIF(base.avg_rps,0)*100) > 20 THEN '\\u274c CRITICAL'\\n            WHEN ((base.avg_rps-curr.avg_rps)/NULLIF(base.avg_rps,0)*100) > 10 THEN '\\u26a0\\ufe0f WARNING'\\n            ELSE '\\u2705 OK' END\\nFROM curr,base\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 101,\n      \"title\": \"\\ud83d\\udd34 Regression Events\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 11\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 10,\n      \"title\": \"Detected Regressions \\u2014 Current Run\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 12\n      },\n      \"options\": {\n        \"showHeader\": true\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Severity\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"critical\": {\n                        \"text\": \"\\u274c CRITICAL\",\n                        \"color\": \"red\",\n                        \"index\": 0\n                      },\n                      \"warning\": {\n                        \"text\": \"\\u26a0\\ufe0f WARNING\",\n                        \"color\": \"yellow\",\n                        \"index\": 1\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Delta %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 10\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 25\n                    }\n                  ]\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT re.metric_name AS \\\"Metric\\\", ROUND(re.baseline_value::NUMERIC,2) AS \\\"Baseline\\\", ROUND(re.current_value::NUMERIC,2) AS \\\"Current\\\", ROUND(re.delta_pct::NUMERIC,1) AS \\\"Delta %\\\", re.severity AS \\\"Severity\\\", CASE WHEN re.acknowledged THEN '\\u2705 Acked' ELSE '\\ud83d\\udd14 Open' END AS \\\"State\\\", to_char(re.detected_at,'HH24:MI:SS') AS \\\"Detected\\\" FROM regression_events re JOIN test_executions te ON te.id=re.execution_id WHERE te.id::text='$run_id' ORDER BY re.severity DESC, re.delta_pct DESC\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 102,\n      \"title\": \"\\u2139\\ufe0f Run Details\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 19\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 20,\n      \"title\": \"Current Run Info\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 20\n      },\n      \"options\": {\n        \"showHeader\": true\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT 'Run ID' AS \\\"Field\\\",run_id AS \\\"Value\\\" FROM test_runs WHERE run_id='$run_id' UNION ALL SELECT 'Test Name',test_name FROM test_runs WHERE run_id='$run_id' UNION ALL SELECT 'Status',status FROM test_runs WHERE run_id='$run_id' UNION ALL SELECT 'Triggered By',triggered_by FROM test_runs WHERE run_id='$run_id' UNION ALL SELECT 'Started',to_char(started_at,'YYYY-MM-DD HH24:MI') FROM test_runs WHERE run_id='$run_id' UNION ALL SELECT 'Duration',duration_s::text||'s' FROM test_runs WHERE run_id='$run_id'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 21,\n      \"title\": \"Baseline Run Info\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 5,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 20\n      },\n      \"options\": {\n        \"showHeader\": true\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT 'Run ID' AS \\\"Field\\\",run_id AS \\\"Value\\\" FROM test_runs WHERE run_id='$compare_id' UNION ALL SELECT 'Test Name',test_name FROM test_runs WHERE run_id='$compare_id' UNION ALL SELECT 'Status',status FROM test_runs WHERE run_id='$compare_id' UNION ALL SELECT 'Started',to_char(started_at,'YYYY-MM-DD HH24:MI') FROM test_runs WHERE run_id='$compare_id' UNION ALL SELECT 'Duration',duration_s::text||'s' FROM test_runs WHERE run_id='$compare_id'\",\n          \"format\": \"table\"\n        }\n      ]\n    }\n  ]\n}"
