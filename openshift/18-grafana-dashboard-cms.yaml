apiVersion: v1
data:
  05-correlation-view.json: "{\n  \"uid\": \"perf-correlation-view\",\n  \"title\": \"\\ud83d\\udd17 Correlation View\",\n  \"description\": \"Three-pillar correlation: JMeter load metrics, Prometheus app/infra, Loki error logs, Tempo traces, Pyroscope profiles\",\n  \"tags\": [\n    \"performance\",\n    \"correlation\",\n    \"observability\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"10s\",\n  \"time\": {\n    \"from\": \"now-1h\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"run_id\",\n        \"label\": \"Test Run\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT run_id||' | '||test_name||' | '||to_char(started_at,'MM-DD HH24:MI') AS __text, run_id AS __value FROM test_runs ORDER BY started_at DESC LIMIT 20\",\n        \"refresh\": 1,\n        \"multi\": false,\n        \"includeAll\": false\n      },\n      {\n        \"name\": \"namespace\",\n        \"label\": \"Namespace\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"prometheus\",\n          \"uid\": \"prometheus-ds\"\n        },\n        \"query\": \"label_values(kube_pod_info, namespace)\",\n        \"regex\": \"\",\n        \"refresh\": 1,\n        \"multi\": false\n      },\n      {\n        \"name\": \"pod\",\n        \"label\": \"Pod\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"prometheus\",\n          \"uid\": \"prometheus-ds\"\n        },\n        \"query\": \"label_values(kube_pod_info{namespace=~\\\"$namespace\\\"}, pod)\",\n        \"regex\": \"\",\n        \"refresh\": 1,\n        \"multi\": false\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"id\": 100,\n      \"title\": \"\\u26a1 JMeter Load Metrics\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 1,\n      \"title\": \"Throughput \\u2014 Active Users & RPS\",\n      \"datasource\": {\n        \"type\": \"influxdb\",\n        \"uid\": \"influxdb-jmeter\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Active Users\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.axisPlacement\",\n                \"value\": \"right\"\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"yellow\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"influxdb\",\n            \"uid\": \"influxdb-jmeter\"\n          },\n          \"query\": \"from(bucket: \\\"jmeter\\\")\\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\\n  |> filter(fn: (r) => r._measurement == \\\"jmeter\\\" and r._field == \\\"avg\\\" and r.statut == \\\"all\\\")\\n  |> aggregateWindow(every: 10s, fn: mean)\\n  |> yield(name: \\\"RPS\\\")\"\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"influxdb\",\n            \"uid\": \"influxdb-jmeter\"\n          },\n          \"query\": \"from(bucket: \\\"jmeter\\\")\\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\\n  |> filter(fn: (r) => r._measurement == \\\"jmeter\\\" and r._field == \\\"countError\\\")\\n  |> aggregateWindow(every: 10s, fn: sum)\\n  |> yield(name: \\\"Errors\\\")\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 2,\n      \"title\": \"JMeter \\u2014 P50 / P90 / P99 Latency\",\n      \"datasource\": {\n        \"type\": \"influxdb\",\n        \"uid\": \"influxdb-jmeter\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 1\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"influxdb\",\n            \"uid\": \"influxdb-jmeter\"\n          },\n          \"query\": \"from(bucket: \\\"jmeter\\\")\\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\\n  |> filter(fn: (r) => r._measurement == \\\"jmeter\\\" and r._field =~ /pct[0-9]+/ and r.statut == \\\"all\\\")\\n  |> aggregateWindow(every: 10s, fn: mean)\\n  |> yield(name: \\\"percentiles\\\")\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 101,\n      \"title\": \"\\ud83c\\udfc3 Application Metrics (Prometheus)\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 8\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 10,\n      \"title\": \"HTTP Request Rate by Status\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 9\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"reqps\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(http_server_requests_seconds_count{namespace=~\\\"$namespace\\\"}[1m])) by (status)\",\n          \"legendFormat\": \"{{status}}\",\n          \"range\": true,\n          \"hide\": false\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 11,\n      \"title\": \"Application P95 Latency (Prometheus)\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 9\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"SLO 200ms\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"orange\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{namespace=~\\\"$namespace\\\"}[1m])) by (le)) * 1000\",\n          \"legendFormat\": \"P95\",\n          \"range\": true,\n          \"hide\": false\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{namespace=~\\\"$namespace\\\"}[1m])) by (le)) * 1000\",\n          \"legendFormat\": \"P99\",\n          \"range\": true,\n          \"hide\": false\n        },\n        {\n          \"refId\": \"C\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"200\",\n          \"legendFormat\": \"SLO 200ms\",\n          \"range\": true,\n          \"hide\": false\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 12,\n      \"title\": \"JVM Heap Usage\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 8,\n        \"x\": 16,\n        \"y\": 9\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"bytes\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(jvm_memory_used_bytes{namespace=~\\\"$namespace\\\", area=\\\"heap\\\"}) by (pod)\",\n          \"legendFormat\": \"{{pod}} Used\",\n          \"range\": true,\n          \"hide\": false\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(jvm_memory_max_bytes{namespace=~\\\"$namespace\\\", area=\\\"heap\\\"}) by (pod)\",\n          \"legendFormat\": \"{{pod}} Max\",\n          \"range\": true,\n          \"hide\": false\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 102,\n      \"title\": \"\\ud83d\\udda5\\ufe0f Infrastructure Metrics\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 16\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 20,\n      \"title\": \"Pod CPU Usage\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 6,\n        \"w\": 8,\n        \"x\": 0,\n        \"y\": 17\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percentunit\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(container_cpu_usage_seconds_total{namespace=~\\\"$namespace\\\", pod=~\\\"$pod\\\", container!=\\\"\\\"}[2m])) by (pod)\",\n          \"legendFormat\": \"{{pod}}\",\n          \"range\": true,\n          \"hide\": false\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 21,\n      \"title\": \"Pod Memory Usage\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 6,\n        \"w\": 8,\n        \"x\": 8,\n        \"y\": 17\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"bytes\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(container_memory_working_set_bytes{namespace=~\\\"$namespace\\\", pod=~\\\"$pod\\\", container!=\\\"\\\"}) by (pod)\",\n          \"legendFormat\": \"{{pod}}\",\n          \"range\": true,\n          \"hide\": false\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 22,\n      \"title\": \"Pod Network I/O\",\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"prometheus-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 6,\n        \"w\": 8,\n        \"x\": 16,\n        \"y\": 17\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"Bps\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(container_network_receive_bytes_total{namespace=~\\\"$namespace\\\"}[2m])) by (pod)\",\n          \"legendFormat\": \"{{pod}} RX\",\n          \"range\": true,\n          \"hide\": false\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"prometheus\",\n            \"uid\": \"prometheus-ds\"\n          },\n          \"expr\": \"sum(rate(container_network_transmit_bytes_total{namespace=~\\\"$namespace\\\"}[2m])) by (pod)\",\n          \"legendFormat\": \"{{pod}} TX\",\n          \"range\": true,\n          \"hide\": false\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 103,\n      \"title\": \"\\ud83d\\udcdc Error Logs & Traces\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 23\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"logs\",\n      \"id\": 30,\n      \"title\": \"Error Logs \\u2014 Live Stream\",\n      \"datasource\": {\n        \"type\": \"loki\",\n        \"uid\": \"loki-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 14,\n        \"x\": 0,\n        \"y\": 24\n      },\n      \"options\": {\n        \"showTime\": true,\n        \"showLabels\": false,\n        \"showCommonLabels\": false,\n        \"wrapLogMessage\": true,\n        \"prettifyLogMessage\": false,\n        \"enableLogDetails\": true,\n        \"dedupStrategy\": \"none\",\n        \"sortOrder\": \"Descending\"\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"loki\",\n            \"uid\": \"loki-ds\"\n          },\n          \"expr\": \"{namespace=~\\\"$namespace\\\"} |= \\\"ERROR\\\" | logfmt | line_format \\\"{{.level}} {{.msg}} traceId={{.traceId}}\\\"\"\n        }\n      ]\n    },\n    {\n      \"type\": \"nodeGraph\",\n      \"id\": 31,\n      \"title\": \"Service Map (Tempo)\",\n      \"datasource\": {\n        \"type\": \"tempo\",\n        \"uid\": \"tempo-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 10,\n        \"x\": 14,\n        \"y\": 24\n      },\n      \"options\": {},\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"tempo\",\n            \"uid\": \"tempo-ds\"\n          },\n          \"queryType\": \"serviceMap\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 104,\n      \"title\": \"\\ud83d\\udd25 Continuous Profiling (Pyroscope)\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 32\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"flamegraph\",\n      \"id\": 40,\n      \"title\": \"CPU Flamegraph \\u2014 Wall Time\",\n      \"datasource\": {\n        \"type\": \"grafana-pyroscope-datasource\",\n        \"uid\": \"pyroscope-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 10,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 33\n      },\n      \"options\": {\n        \"collapsing\": true\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"grafana-pyroscope-datasource\",\n            \"uid\": \"pyroscope-ds\"\n          },\n          \"profileTypeId\": \"wall:samples:count:wall:nanoseconds\",\n          \"labelSelector\": \"{namespace=~\\\"$namespace\\\"}\",\n          \"groupBy\": [\n            \"pod\"\n          ]\n        }\n      ]\n    }\n  ]\n}"
