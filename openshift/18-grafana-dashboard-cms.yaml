data:
  06-regression-tracker.json: "{\n  \"uid\": \"perf-regression-tracker\",\n  \"title\": \"\\ud83d\\udd34 Regression Tracker\",\n  \"description\": \"Automatic regression detection \\u2014 current vs baseline delta analysis with severity triage\",\n  \"tags\": [\n    \"performance\",\n    \"regression\",\n    \"alerts\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"30s\",\n  \"time\": {\n    \"from\": \"now-7d\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"environment\",\n        \"label\": \"Environment\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT name FROM environments ORDER BY name\",\n        \"refresh\": 2,\n        \"multi\": false,\n        \"includeAll\": false\n      },\n      {\n        \"name\": \"service\",\n        \"label\": \"Service\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT DISTINCT service FROM test_plans WHERE service IS NOT NULL ORDER BY service\",\n        \"refresh\": 2,\n        \"multi\": false,\n        \"includeAll\": false\n      },\n      {\n        \"name\": \"severity\",\n        \"label\": \"Severity\",\n        \"type\": \"custom\",\n        \"query\": \"critical,warning\",\n        \"current\": {\n          \"text\": \"All\",\n          \"value\": \"$__all\"\n        },\n        \"options\": [\n          {\n            \"text\": \"All\",\n            \"value\": \"$__all\",\n            \"selected\": true\n          },\n          {\n            \"text\": \"critical\",\n            \"value\": \"critical\",\n            \"selected\": false\n          },\n          {\n            \"text\": \"warning\",\n            \"value\": \"warning\",\n            \"selected\": false\n          }\n        ],\n        \"multi\": true,\n        \"includeAll\": true,\n        \"refresh\": 0\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"id\": 100,\n      \"title\": \"\\ud83d\\udcca Regression Overview\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 1,\n      \"title\": \"Open Critical Regressions\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 1\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.severity='critical' AND re.acknowledged=false AND re.false_positive=false AND re.detected_at > NOW()-INTERVAL '7 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 2,\n      \"title\": \"Open Warnings\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 4,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 1\n              },\n              {\n                \"color\": \"orange\",\n                \"value\": 5\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.severity='warning' AND re.acknowledged=false AND re.false_positive=false AND re.detected_at > NOW()-INTERVAL '7 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 3,\n      \"title\": \"Acknowledged (7d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 8,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.acknowledged=true AND re.detected_at > NOW()-INTERVAL '7 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 4,\n      \"title\": \"False Positives (7d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 12,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.false_positive=true AND re.detected_at > NOW()-INTERVAL '7 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 5,\n      \"title\": \"Avg Delta % (Critical)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 16,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 15\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 30\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(AVG(re.delta_pct)::NUMERIC,1) AS value FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.severity='critical' AND re.detected_at > NOW()-INTERVAL '7 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 6,\n      \"title\": \"Runs with Regressions (7d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 20,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 1\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 3\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(DISTINCT te.id) AS value FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.detected_at > NOW()-INTERVAL '7 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 101,\n      \"title\": \"\\ud83d\\uddc2\\ufe0f Open Regressions\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 4\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 10,\n      \"title\": \"All Regression Events (7d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 10,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 5\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Severity\",\n            \"desc\": false\n          },\n          {\n            \"displayName\": \"Delta %\",\n            \"desc\": true\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Severity\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"custom.width\",\n                \"value\": 120\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"critical\": {\n                        \"text\": \"\\u274c CRITICAL\",\n                        \"color\": \"red\",\n                        \"index\": 0\n                      },\n                      \"warning\": {\n                        \"text\": \"\\u26a0\\ufe0f WARNING\",\n                        \"color\": \"yellow\",\n                        \"index\": 1\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Delta %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"unit\",\n                \"value\": \"percent\"\n              },\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 10\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 25\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"State\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"custom.width\",\n                \"value\": 110\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"\\ud83d\\udd14 Open\": {\n                        \"color\": \"red\",\n                        \"index\": 0\n                      },\n                      \"\\u2705 Acked\": {\n                        \"color\": \"green\",\n                        \"index\": 1\n                      },\n                      \"\\ud83d\\udeab FP\": {\n                        \"color\": \"blue\",\n                        \"index\": 2\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT\\n  te.id::text AS \\\"Run ID\\\",\\n  tp.service AS \\\"Service\\\",\\n  re.metric_name AS \\\"Metric\\\",\\n  ROUND(re.baseline_value::NUMERIC,2) AS \\\"Baseline\\\",\\n  ROUND(re.current_value::NUMERIC,2) AS \\\"Current\\\",\\n  ROUND(re.delta_pct::NUMERIC,1) AS \\\"Delta %\\\",\\n  re.severity AS \\\"Severity\\\",\\n  CASE WHEN re.false_positive THEN '\\ud83d\\udeab FP'\\n       WHEN re.acknowledged THEN '\\u2705 Acked'\\n       ELSE '\\ud83d\\udd14 Open' END AS \\\"State\\\",\\n  to_char(re.detected_at,'MM-DD HH24:MI') AS \\\"Detected\\\"\\nFROM regression_events re\\nJOIN test_executions te ON te.id=re.execution_id\\nJOIN test_plans tp ON tp.id=te.test_plan_id\\nWHERE tp.service='$service'\\n  AND re.severity IN ($severity)\\n  AND re.detected_at > NOW()-INTERVAL '7 days'\\n  AND re.false_positive=false\\nORDER BY re.severity, re.delta_pct DESC\\nLIMIT 200\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 102,\n      \"title\": \"\\ud83d\\udcc8 P95 Latency \\u2014 Current vs Baseline\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 15\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 20,\n      \"title\": \"P95 Latency: Run Timeline with Baseline Reference\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 16\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"table\",\n          \"placement\": \"bottom\",\n          \"calcs\": [\n            \"mean\",\n            \"min\",\n            \"max\"\n          ]\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"custom\": {\n            \"lineWidth\": 2\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Baseline P95\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\",\n                  \"dash\": [\n                    8,\n                    4\n                  ]\n                }\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"orange\"\n                }\n              },\n              {\n                \"id\": \"custom.lineWidth\",\n                \"value\": 2\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"SLO\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              },\n              {\n                \"id\": \"custom.lineWidth\",\n                \"value\": 1\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT started_at AS time, p95_ms AS \\\"P95 Latency\\\" FROM test_runs WHERE service='$service' AND environment='$environment' AND started_at > NOW()-INTERVAL '7 days' ORDER BY started_at\",\n          \"format\": \"time_series\"\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT NOW() AS time, p95_ms AS \\\"Baseline P95\\\" FROM baselines b JOIN test_executions te ON te.id=b.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND b.is_active=true LIMIT 1\",\n          \"format\": \"time_series\"\n        },\n        {\n          \"refId\": \"C\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT NOW() AS time, 200 AS \\\"SLO\\\" \",\n          \"format\": \"time_series\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 103,\n      \"title\": \"\\ud83d\\udcca Regression Frequency by Metric\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 24\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"barchart\",\n      \"id\": 30,\n      \"title\": \"Regression Count by Metric (7d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 25\n      },\n      \"options\": {\n        \"orientation\": \"horizontal\",\n        \"xTickLabelRotation\": 0,\n        \"barWidth\": 0.6,\n        \"groupWidth\": 0.7,\n        \"stacking\": \"none\",\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT re.metric_name AS \\\"Metric\\\", COUNT(*) AS \\\"Regressions\\\" FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.detected_at > NOW()-INTERVAL '7 days' GROUP BY re.metric_name ORDER BY COUNT(*) DESC\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"barchart\",\n      \"id\": 31,\n      \"title\": \"Regression Count by Day (7d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 25\n      },\n      \"options\": {\n        \"orientation\": \"auto\",\n        \"xTickLabelRotation\": -45,\n        \"barWidth\": 0.6,\n        \"stacking\": \"normal\",\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"critical\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"warning\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"yellow\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT DATE_TRUNC('day', re.detected_at) AS time, re.severity, COUNT(*) AS \\\"count\\\" FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.detected_at > NOW()-INTERVAL '7 days' GROUP BY DATE_TRUNC('day', re.detected_at), re.severity ORDER BY time\",\n          \"format\": \"time_series\"\n        }\n      ]\n    }\n  ]\n}"
