apiVersion: v1
data:
  04-historical-trends.json: "{\n  \"uid\": \"perf-historical-trends\",\n  \"title\": \"\\ud83d\\udcc8 Historical Trends\",\n  \"description\": \"90-day rolling performance trends by service and environment\",\n  \"tags\": [\n    \"performance\",\n    \"trends\",\n    \"history\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"5m\",\n  \"time\": {\n    \"from\": \"now-90d\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"environment\",\n        \"label\": \"Environment\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT name FROM environments ORDER BY name\",\n        \"refresh\": 2,\n        \"multi\": false,\n        \"includeAll\": false\n      },\n      {\n        \"name\": \"service\",\n        \"label\": \"Service\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT DISTINCT service FROM test_plans WHERE service IS NOT NULL ORDER BY service\",\n        \"refresh\": 2,\n        \"multi\": false,\n        \"includeAll\": false\n      },\n      {\n        \"name\": \"scenario\",\n        \"label\": \"Scenario\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT DISTINCT scenario FROM test_plans WHERE service='$service' AND scenario IS NOT NULL ORDER BY scenario\",\n        \"refresh\": 2,\n        \"multi\": true,\n        \"includeAll\": true\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"id\": 100,\n      \"title\": \"\\ud83d\\udcca KPI Summary\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 1,\n      \"title\": \"Total Runs (90d)\",\n      \"description\": \"\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM test_runs WHERE environment='$environment' AND service='$service' AND started_at > NOW()-INTERVAL '90 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 2,\n      \"title\": \"Pass Rate (90d)\",\n      \"description\": \"\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 4,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 80\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 95\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(100.0*SUM(CASE WHEN status='passed' THEN 1 ELSE 0 END)/NULLIF(COUNT(*),0),1) AS value FROM test_runs WHERE environment='$environment' AND service='$service' AND started_at > NOW()-INTERVAL '90 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 3,\n      \"title\": \"Avg P95 Latency (90d)\",\n      \"description\": \"\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 8,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 150\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 200\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(AVG(p95_ms)::NUMERIC,1) AS value FROM test_runs WHERE environment='$environment' AND service='$service' AND started_at > NOW()-INTERVAL '90 days' AND p95_ms IS NOT NULL\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 4,\n      \"title\": \"Avg Error Rate (90d)\",\n      \"description\": \"\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 12,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"decimals\": 3,\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 0.5\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 1\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(AVG(error_rate_pct)::NUMERIC,3) AS value FROM test_runs WHERE environment='$environment' AND service='$service' AND started_at > NOW()-INTERVAL '90 days' AND error_rate_pct IS NOT NULL\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 5,\n      \"title\": \"Total Regressions (90d)\",\n      \"description\": \"\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 16,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 1\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 5\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.detected_at > NOW()-INTERVAL '90 days' AND re.severity='critical'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 6,\n      \"title\": \"Avg Peak RPS (90d)\",\n      \"description\": \"\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 3,\n        \"w\": 4,\n        \"x\": 20,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"auto\",\n        \"colorMode\": \"background\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"reqps\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(AVG(peak_rps)::NUMERIC,1) AS value FROM test_runs WHERE environment='$environment' AND service='$service' AND started_at > NOW()-INTERVAL '90 days' AND peak_rps IS NOT NULL\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 101,\n      \"title\": \"\\ud83d\\udcc9 P95 Latency Trend\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 4\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 10,\n      \"title\": \"P95 Latency \\u2014 Daily Trend (90d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 5\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"table\",\n          \"placement\": \"bottom\",\n          \"calcs\": [\n            \"mean\",\n            \"min\",\n            \"max\"\n          ]\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 10\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"P95 Min\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"custom.lineWidth\",\n                \"value\": 1\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"light-blue\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"P95 Max\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"custom.lineWidth\",\n                \"value\": 1\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"light-red\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"SLO Threshold\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\",\n                  \"dash\": [\n                    10,\n                    5\n                  ]\n                }\n              },\n              {\n                \"id\": \"custom.lineWidth\",\n                \"value\": 2\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"orange\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT day AS time, ROUND(avg_p95_ms::NUMERIC,1) AS \\\"P95 Avg\\\", ROUND(min_p95_ms::NUMERIC,1) AS \\\"P95 Min\\\", ROUND(max_p95_ms::NUMERIC,1) AS \\\"P95 Max\\\", 200 AS \\\"SLO Threshold\\\" FROM perf_trends WHERE environment='$environment' AND service='$service' ORDER BY day\",\n          \"format\": \"time_series\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 102,\n      \"title\": \"\\ud83d\\udcca Pass/Fail Distribution\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 13\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"barchart\",\n      \"id\": 20,\n      \"title\": \"Daily Pass / Fail Runs\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 12,\n        \"x\": 0,\n        \"y\": 14\n      },\n      \"options\": {\n        \"orientation\": \"auto\",\n        \"xTickLabelRotation\": 0,\n        \"barWidth\": 0.7,\n        \"groupWidth\": 0.7,\n        \"stacking\": \"normal\",\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Passed\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"green\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Failed\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT day AS time, passed_count AS \\\"Passed\\\", failed_count AS \\\"Failed\\\" FROM perf_trends WHERE environment='$environment' AND service='$service' ORDER BY day\",\n          \"format\": \"time_series\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 21,\n      \"title\": \"Error Rate Trend (90d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 7,\n        \"w\": 12,\n        \"x\": 12,\n        \"y\": 14\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 15\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Error Rate\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"SLO\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"orange\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT day AS time, ROUND(avg_error_rate::NUMERIC,3) AS \\\"Error Rate\\\", 1.0 AS \\\"SLO\\\" FROM perf_trends WHERE environment='$environment' AND service='$service' ORDER BY day\",\n          \"format\": \"time_series\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 103,\n      \"title\": \"\\ud83d\\udccb All Runs Table\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 21\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 30,\n      \"title\": \"All Test Runs\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 10,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 22\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Started\",\n            \"desc\": true\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Status\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"passed\": {\n                        \"color\": \"green\",\n                        \"index\": 0\n                      },\n                      \"failed\": {\n                        \"color\": \"red\",\n                        \"index\": 1\n                      },\n                      \"running\": {\n                        \"color\": \"blue\",\n                        \"index\": 2\n                      },\n                      \"aborted\": {\n                        \"color\": \"orange\",\n                        \"index\": 3\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"P95 (ms)\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 150\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 200\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Error %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"unit\",\n                \"value\": \"percent\"\n              },\n              {\n                \"id\": \"decimals\",\n                \"value\": 3\n              },\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 0.5\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 1\n                    }\n                  ]\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT run_id AS \\\"Run ID\\\", test_name AS \\\"Test\\\", environment AS \\\"Env\\\", status AS \\\"Status\\\", ROUND(p95_ms::NUMERIC,1) AS \\\"P95 (ms)\\\", ROUND(error_rate_pct::NUMERIC,3) AS \\\"Error %\\\", ROUND(peak_rps::NUMERIC,1) AS \\\"Peak RPS\\\", to_char(started_at,'YYYY-MM-DD HH24:MI') AS \\\"Started\\\", duration_s::text||'s' AS \\\"Duration\\\" FROM test_runs WHERE environment='$environment' AND service='$service' ORDER BY started_at DESC LIMIT 100\",\n          \"format\": \"table\"\n        }\n      ]\n    }\n  ]\n}"
