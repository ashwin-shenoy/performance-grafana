apiVersion: v1
data:
  03-slo-tracker.json: "{\n  \"uid\": \"perf-slo-tracker\",\n  \"title\": \"\\ud83d\\udcca SLO / SLA Tracker\",\n  \"description\": \"Service Level Objective compliance tracking, error budget, and trend analysis\",\n  \"tags\": [\n    \"performance\",\n    \"slo\",\n    \"sla\",\n    \"compliance\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"1m\",\n  \"time\": {\n    \"from\": \"now-30d\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"environment\",\n        \"label\": \"Environment\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT name FROM environments ORDER BY name\",\n        \"refresh\": 2,\n        \"current\": {\n          \"text\": \"staging\",\n          \"value\": \"staging\"\n        }\n      },\n      {\n        \"name\": \"service\",\n        \"label\": \"Service\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT DISTINCT service FROM test_plans WHERE service IS NOT NULL ORDER BY service\",\n        \"refresh\": 2,\n        \"current\": {\n          \"text\": \"sample-app\",\n          \"value\": \"sample-app\"\n        }\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"id\": 100,\n      \"title\": \"\\ud83c\\udfaf SLO Health Overview (30 days)\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 1,\n      \"title\": \"Overall SLO Compliance\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 90\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 99\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND((100.0*SUM(CASE WHEN sr.passed THEN 1 ELSE 0 END)/NULLIF(COUNT(*),0))::NUMERIC,1) FROM slo_results sr JOIN slo_definitions sd ON sd.id=sr.slo_id JOIN test_executions te ON te.id=sr.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND te.started_at>=NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 2,\n      \"title\": \"Total Test Runs (30d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 4,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) FROM test_runs WHERE service='$service' AND environment='$environment' AND started_at>=NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 3,\n      \"title\": \"Passed Runs\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 8,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 1\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) FROM test_runs WHERE service='$service' AND environment='$environment' AND status='COMPLETED' AND started_at>=NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 4,\n      \"title\": \"Failed Runs\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 12,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 1\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 3\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) FROM test_runs WHERE service='$service' AND environment='$environment' AND status='FAILED' AND started_at>=NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 5,\n      \"title\": \"Regressions (30d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 16,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\",\n        \"justifyMode\": \"center\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 1\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 3\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) FROM regression_events re JOIN test_executions te ON te.id=re.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND re.detected_at>=NOW()-INTERVAL '30 days' AND re.false_positive=false\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"gauge\",\n      \"id\": 6,\n      \"title\": \"P95 Latency SLO Health\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 20,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"showThresholdLabels\": false,\n        \"showThresholdMarkers\": true\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 90\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 99\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND((100.0*SUM(CASE WHEN sr.passed THEN 1 ELSE 0 END)/NULLIF(COUNT(*),0))::NUMERIC,1) FROM slo_results sr JOIN slo_definitions sd ON sd.id=sr.slo_id JOIN test_executions te ON te.id=sr.execution_id JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND sd.metric_name='p95_ms' AND te.started_at>=NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 101,\n      \"title\": \"\\ud83d\\udccb SLO Definitions & Compliance\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 5\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 10,\n      \"title\": \"SLO Compliance per Metric \\u2014 30 Days\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 14,\n        \"x\": 0,\n        \"y\": 6\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Compliance %\",\n            \"desc\": false\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Compliance %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"lcd-gauge\"\n              },\n              {\n                \"id\": \"min\",\n                \"value\": 0\n              },\n              {\n                \"id\": \"max\",\n                \"value\": 100\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"red\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 90\n                    },\n                    {\n                      \"color\": \"green\",\n                      \"value\": 99\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Severity\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"critical\": {\n                        \"color\": \"red\",\n                        \"index\": 0\n                      },\n                      \"warning\": {\n                        \"color\": \"yellow\",\n                        \"index\": 1\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT sd.metric_name AS \\\"SLO Metric\\\", sd.operator||' '||sd.threshold||' '||sd.unit AS \\\"Target\\\", sd.severity AS \\\"Severity\\\", COUNT(*) AS \\\"Total Runs\\\", SUM(CASE WHEN sr.passed THEN 1 ELSE 0 END) AS \\\"Passed\\\", ROUND((100.0*SUM(CASE WHEN sr.passed THEN 1 ELSE 0 END)/NULLIF(COUNT(*),0))::NUMERIC,1) AS \\\"Compliance %\\\", ROUND(AVG(sr.actual_value)::NUMERIC,2) AS \\\"Avg Actual\\\", ROUND(MAX(sr.actual_value)::NUMERIC,2) AS \\\"Worst\\\" FROM slo_definitions sd LEFT JOIN slo_results sr ON sr.slo_id=sd.id LEFT JOIN test_executions te ON te.id=sr.execution_id LEFT JOIN test_plans tp ON tp.id=te.test_plan_id WHERE tp.service='$service' AND sd.service='$service' AND te.started_at>=NOW()-INTERVAL '30 days' GROUP BY sd.metric_name,sd.operator,sd.threshold,sd.unit,sd.severity ORDER BY \\\"Compliance %\\\" ASC\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 11,\n      \"title\": \"P95 Latency vs SLO Threshold\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 10,\n        \"x\": 14,\n        \"y\": 6\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"list\",\n          \"placement\": \"bottom\"\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 5\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"SLO Threshold\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              },\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\",\n                  \"dash\": [\n                    10,\n                    10\n                  ]\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT started_at AS time, p95_ms AS \\\"P95 Latency\\\" FROM test_runs WHERE service='$service' AND environment='$environment' AND p95_ms IS NOT NULL AND started_at>=$__timeFrom()::timestamptz ORDER BY started_at ASC\",\n          \"format\": \"time_series\"\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT tr.started_at AS time, sd.threshold AS \\\"SLO Threshold\\\" FROM test_runs tr, slo_definitions sd WHERE tr.service='$service' AND sd.service='$service' AND sd.metric_name='p95_ms' AND tr.p95_ms IS NOT NULL AND tr.started_at>=$__timeFrom()::timestamptz ORDER BY tr.started_at ASC\",\n          \"format\": \"time_series\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 102,\n      \"title\": \"\\ud83d\\udcc5 Recent Run SLO History\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 14\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 20,\n      \"title\": \"Recent 20 Runs \\u2014 SLO Results\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 15\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Started\",\n            \"desc\": true\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Status\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"COMPLETED\": {\n                        \"text\": \"\\u2705 PASSED\",\n                        \"color\": \"green\",\n                        \"index\": 0\n                      },\n                      \"FAILED\": {\n                        \"text\": \"\\u274c FAILED\",\n                        \"color\": \"red\",\n                        \"index\": 1\n                      },\n                      \"RUNNING\": {\n                        \"text\": \"\\ud83d\\udd34 RUNNING\",\n                        \"color\": \"orange\",\n                        \"index\": 2\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"P95 (ms)\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 150\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 200\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Error %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 0.5\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 1\n                    }\n                  ]\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT to_char(tr.started_at,'MM-DD HH24:MI') AS \\\"Started\\\", tr.run_id AS \\\"Run ID\\\", tr.status AS \\\"Status\\\", ROUND(tr.p95_ms::NUMERIC,0) AS \\\"P95 (ms)\\\", ROUND(tr.p99_ms::NUMERIC,0) AS \\\"P99 (ms)\\\", ROUND(tr.error_rate_pct::NUMERIC,2) AS \\\"Error %\\\", ROUND(tr.peak_rps::NUMERIC,0) AS \\\"Peak RPS\\\", tr.passed_slos::text||'/'||(tr.passed_slos+tr.failed_slos)::text AS \\\"SLOs\\\", tr.triggered_by AS \\\"Triggered By\\\" FROM test_runs tr WHERE tr.service='$service' AND tr.environment='$environment' AND tr.started_at>=$__timeFrom()::timestamptz ORDER BY tr.started_at DESC LIMIT 20\",\n          \"format\": \"table\"\n        }\n      ]\n    }\n  ]\n}"
kind: ConfigMap
metadata:
  labels:
    app: grafana
  name: grafana-dashboard-03
  namespace: perf-testing
