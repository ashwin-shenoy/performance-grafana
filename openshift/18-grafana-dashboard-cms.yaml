data:
  07-executive-summary.json: "{\n  \"uid\": \"perf-executive-summary\",\n  \"title\": \"\\ud83d\\udccb Executive Summary\",\n  \"description\": \"High-level KPIs and service scorecards for leadership review\",\n  \"tags\": [\n    \"performance\",\n    \"executive\",\n    \"kpi\",\n    \"summary\"\n  ],\n  \"schemaVersion\": 38,\n  \"version\": 1,\n  \"refresh\": \"5m\",\n  \"time\": {\n    \"from\": \"now-30d\",\n    \"to\": \"now\"\n  },\n  \"timepicker\": {},\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"environment\",\n        \"label\": \"Environment\",\n        \"type\": \"query\",\n        \"datasource\": {\n          \"type\": \"postgres\",\n          \"uid\": \"postgres-ds\"\n        },\n        \"query\": \"SELECT name FROM environments ORDER BY name\",\n        \"refresh\": 2,\n        \"multi\": false,\n        \"includeAll\": false\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"type\": \"row\",\n      \"id\": 100,\n      \"title\": \"\\ud83c\\udfaf Platform KPIs \\u2014 Last 30 Days\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 0\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 1,\n      \"title\": \"Total Test Runs\",\n      \"description\": \"All environments\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 0,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"value_and_name\",\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"blue\"\n          },\n          \"mappings\": [],\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"blue\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM test_runs WHERE environment='$environment' AND started_at > NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 2,\n      \"title\": \"Platform Pass Rate\",\n      \"description\": \"All services\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 4,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"value_and_name\",\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 80\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 95\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(100.0*SUM(CASE WHEN status='passed' THEN 1 ELSE 0 END)/NULLIF(COUNT(*),0),1) AS value FROM test_runs WHERE environment='$environment' AND started_at > NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 3,\n      \"title\": \"SLO Compliance\",\n      \"description\": \"Avg across all services\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 8,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"value_and_name\",\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"red\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 90\n              },\n              {\n                \"color\": \"green\",\n                \"value\": 99\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(100.0*SUM(sr.passed::int)/NULLIF(COUNT(*),0),1) AS value\\nFROM slo_results sr\\nJOIN test_executions te ON te.id=sr.execution_id\\nWHERE te.started_at > NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 4,\n      \"title\": \"Critical Regressions\",\n      \"description\": \"Unresolved (30d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 12,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"value_and_name\",\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 1\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 5\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(*) AS value FROM regression_events WHERE severity='critical' AND acknowledged=false AND false_positive=false AND detected_at > NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 5,\n      \"title\": \"Services Tested\",\n      \"description\": \"Unique services\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 16,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"value_and_name\",\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": {\n            \"mode\": \"fixed\",\n            \"fixedColor\": \"purple\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"purple\",\n                \"value\": null\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT COUNT(DISTINCT service) AS value FROM test_runs WHERE environment='$environment' AND started_at > NOW()-INTERVAL '30 days'\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"stat\",\n      \"id\": 6,\n      \"title\": \"Avg P95 Latency\",\n      \"description\": \"Platform-wide\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 4,\n        \"w\": 4,\n        \"x\": 20,\n        \"y\": 1\n      },\n      \"options\": {\n        \"reduceOptions\": {\n          \"calcs\": [\n            \"lastNotNull\"\n          ]\n        },\n        \"orientation\": \"auto\",\n        \"textMode\": \"value_and_name\",\n        \"colorMode\": \"background\",\n        \"graphMode\": \"none\"\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"ms\",\n          \"color\": {\n            \"mode\": \"thresholds\"\n          },\n          \"thresholds\": {\n            \"mode\": \"absolute\",\n            \"steps\": [\n              {\n                \"color\": \"green\",\n                \"value\": null\n              },\n              {\n                \"color\": \"yellow\",\n                \"value\": 150\n              },\n              {\n                \"color\": \"red\",\n                \"value\": 200\n              }\n            ]\n          }\n        },\n        \"overrides\": []\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT ROUND(AVG(p95_ms)::NUMERIC,1) AS value FROM test_runs WHERE environment='$environment' AND started_at > NOW()-INTERVAL '30 days' AND p95_ms IS NOT NULL\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 101,\n      \"title\": \"\\ud83c\\udfc5 Service Scorecard\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 5\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 10,\n      \"title\": \"Service Scorecard \\u2014 Last 30 Days\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 10,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 6\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Pass Rate %\",\n            \"desc\": true\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Pass Rate %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"unit\",\n                \"value\": \"percent\"\n              },\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"lcd-gauge\"\n              },\n              {\n                \"id\": \"min\",\n                \"value\": 0\n              },\n              {\n                \"id\": \"max\",\n                \"value\": 100\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"red\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 80\n                    },\n                    {\n                      \"color\": \"green\",\n                      \"value\": 95\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Avg P95 (ms)\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 150\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 200\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Avg Error %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"unit\",\n                \"value\": \"percent\"\n              },\n              {\n                \"id\": \"decimals\",\n                \"value\": 3\n              },\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 0.5\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 1\n                    }\n                  ]\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Open Issues\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 1\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 3\n                    }\n                  ]\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT\\n  tr.service AS \\\"Service\\\",\\n  COUNT(*) AS \\\"Runs\\\",\\n  ROUND(100.0*SUM(CASE WHEN tr.status='passed' THEN 1 ELSE 0 END)/NULLIF(COUNT(*),0),1) AS \\\"Pass Rate %\\\",\\n  ROUND(AVG(tr.p95_ms)::NUMERIC,1) AS \\\"Avg P95 (ms)\\\",\\n  ROUND(AVG(tr.error_rate_pct)::NUMERIC,3) AS \\\"Avg Error %\\\",\\n  ROUND(AVG(tr.peak_rps)::NUMERIC,1) AS \\\"Avg Peak RPS\\\",\\n  COUNT(CASE WHEN re.severity='critical' AND re.acknowledged=false AND re.false_positive=false THEN 1 END) AS \\\"Open Issues\\\"\\nFROM test_runs tr\\nLEFT JOIN regression_events re ON re.execution_id=tr.execution_id AND re.detected_at > NOW()-INTERVAL '30 days'\\nWHERE tr.environment='$environment' AND tr.started_at > NOW()-INTERVAL '30 days'\\nGROUP BY tr.service\\nORDER BY \\\"Pass Rate %\\\" DESC\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 102,\n      \"title\": \"\\ud83d\\udcc8 Weekly Pass Rate Trend\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 16\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"timeseries\",\n      \"id\": 20,\n      \"title\": \"Weekly Pass Rate per Service\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 16,\n        \"x\": 0,\n        \"y\": 17\n      },\n      \"options\": {\n        \"tooltip\": {\n          \"mode\": \"multi\"\n        },\n        \"legend\": {\n          \"displayMode\": \"table\",\n          \"placement\": \"right\",\n          \"calcs\": [\n            \"mean\",\n            \"last\"\n          ]\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n          \"custom\": {\n            \"lineWidth\": 2,\n            \"fillOpacity\": 5\n          }\n        },\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"SLO Target\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.lineStyle\",\n                \"value\": {\n                  \"fill\": \"dash\"\n                }\n              },\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"orange\"\n                }\n              },\n              {\n                \"id\": \"custom.lineWidth\",\n                \"value\": 1\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT DATE_TRUNC('week', started_at) AS time, service, ROUND(100.0*SUM(CASE WHEN status='passed' THEN 1 ELSE 0 END)/NULLIF(COUNT(*),0),1) AS \\\"pass_rate\\\" FROM test_runs WHERE environment='$environment' AND started_at > NOW()-INTERVAL '30 days' GROUP BY DATE_TRUNC('week', started_at), service ORDER BY time\",\n          \"format\": \"time_series\"\n        },\n        {\n          \"refId\": \"B\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT NOW()-INTERVAL '30 days' AS time, 95 AS \\\"SLO Target\\\" UNION ALL SELECT NOW(), 95\",\n          \"format\": \"time_series\"\n        }\n      ]\n    },\n    {\n      \"type\": \"piechart\",\n      \"id\": 21,\n      \"title\": \"Run Status Distribution (30d)\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 8,\n        \"x\": 16,\n        \"y\": 17\n      },\n      \"options\": {\n        \"pieType\": \"donut\",\n        \"displayLabels\": [\n          \"name\",\n          \"percent\"\n        ],\n        \"legend\": {\n          \"displayMode\": \"table\",\n          \"placement\": \"bottom\",\n          \"values\": [\n            \"value\",\n            \"percent\"\n          ]\n        }\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"passed\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"green\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"failed\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"red\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"running\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"blue\"\n                }\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"aborted\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"color\",\n                \"value\": {\n                  \"mode\": \"fixed\",\n                  \"fixedColor\": \"orange\"\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT status, COUNT(*) AS value FROM test_runs WHERE environment='$environment' AND started_at > NOW()-INTERVAL '30 days' GROUP BY status ORDER BY COUNT(*) DESC\",\n          \"format\": \"table\"\n        }\n      ]\n    },\n    {\n      \"type\": \"row\",\n      \"id\": 103,\n      \"title\": \"\\ud83d\\udd0d Recent High-Impact Events\",\n      \"gridPos\": {\n        \"h\": 1,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 25\n      },\n      \"collapsed\": false\n    },\n    {\n      \"type\": \"table\",\n      \"id\": 30,\n      \"title\": \"Recent Critical Regressions & SLO Breaches\",\n      \"datasource\": {\n        \"type\": \"postgres\",\n        \"uid\": \"postgres-ds\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 24,\n        \"x\": 0,\n        \"y\": 26\n      },\n      \"options\": {\n        \"showHeader\": true,\n        \"sortBy\": [\n          {\n            \"displayName\": \"Detected\",\n            \"desc\": true\n          }\n        ]\n      },\n      \"fieldConfig\": {\n        \"defaults\": {},\n        \"overrides\": [\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Severity\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-background\"\n              },\n              {\n                \"id\": \"custom.width\",\n                \"value\": 120\n              },\n              {\n                \"id\": \"mappings\",\n                \"value\": [\n                  {\n                    \"type\": \"value\",\n                    \"options\": {\n                      \"critical\": {\n                        \"text\": \"\\u274c CRITICAL\",\n                        \"color\": \"red\",\n                        \"index\": 0\n                      },\n                      \"warning\": {\n                        \"text\": \"\\u26a0\\ufe0f WARNING\",\n                        \"color\": \"yellow\",\n                        \"index\": 1\n                      }\n                    }\n                  }\n                ]\n              }\n            ]\n          },\n          {\n            \"matcher\": {\n              \"id\": \"byName\",\n              \"options\": \"Delta %\"\n            },\n            \"properties\": [\n              {\n                \"id\": \"unit\",\n                \"value\": \"percent\"\n              },\n              {\n                \"id\": \"custom.displayMode\",\n                \"value\": \"color-text\"\n              },\n              {\n                \"id\": \"thresholds\",\n                \"value\": {\n                  \"mode\": \"absolute\",\n                  \"steps\": [\n                    {\n                      \"color\": \"green\",\n                      \"value\": null\n                    },\n                    {\n                      \"color\": \"yellow\",\n                      \"value\": 10\n                    },\n                    {\n                      \"color\": \"red\",\n                      \"value\": 25\n                    }\n                  ]\n                }\n              }\n            ]\n          }\n        ]\n      },\n      \"targets\": [\n        {\n          \"refId\": \"A\",\n          \"datasource\": {\n            \"type\": \"postgres\",\n            \"uid\": \"postgres-ds\"\n          },\n          \"rawSql\": \"SELECT\\n  tp.service AS \\\"Service\\\",\\n  re.metric_name AS \\\"Metric\\\",\\n  ROUND(re.delta_pct::NUMERIC,1) AS \\\"Delta %\\\",\\n  re.severity AS \\\"Severity\\\",\\n  CASE WHEN re.acknowledged THEN '\\u2705 Resolved' ELSE '\\ud83d\\udd14 Open' END AS \\\"State\\\",\\n  to_char(re.detected_at,'YYYY-MM-DD HH24:MI') AS \\\"Detected\\\"\\nFROM regression_events re\\nJOIN test_executions te ON te.id=re.execution_id\\nJOIN test_plans tp ON tp.id=te.test_plan_id\\nWHERE re.severity='critical' AND re.false_positive=false AND re.detected_at > NOW()-INTERVAL '30 days'\\nORDER BY re.detected_at DESC\\nLIMIT 25\",\n          \"format\": \"table\"\n        }\n      ]\n    }\n  ]\n}"
