# ─────────────────────────────────────────────────────────────────────────────
# Regression Engine — FastAPI microservice
# ─────────────────────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: regression-engine
  namespace: perf-testing
  labels:
    app: regression-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: regression-engine
  template:
    metadata:
      labels:
        app: regression-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: regression-engine
          image: image-registry.openshift-image-registry.svc:5000/perf-testing/perf-regression-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: postgresql
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: perfplatform
            - name: GRAFANA_URL
              value: http://grafana:3000
            - name: GRAFANA_USER
              value: admin
            - name: GRAFANA_FOLDER
              value: JMeter
            - name: SCAN_INTERVAL_SECONDS
              value: "60"
            - name: THRESHOLD_P50_WARNING
              value: "10.0"
            - name: THRESHOLD_P50_CRITICAL
              value: "25.0"
            - name: THRESHOLD_P95_WARNING
              value: "10.0"
            - name: THRESHOLD_P95_CRITICAL
              value: "25.0"
            - name: THRESHOLD_P99_WARNING
              value: "15.0"
            - name: THRESHOLD_P99_CRITICAL
              value: "30.0"
            - name: THRESHOLD_ERROR_RATE_WARNING
              value: "50.0"
            - name: THRESHOLD_ERROR_RATE_CRITICAL
              value: "100.0"
            - name: THRESHOLD_RPS_WARNING
              value: "10.0"
            - name: THRESHOLD_RPS_CRITICAL
              value: "20.0"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: regression-engine
  namespace: perf-testing
  labels:
    app: regression-engine
spec:
  selector:
    app: regression-engine
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: perf-regression
  namespace: perf-testing
  labels:
    app: regression-engine
spec:
  to:
    kind: Service
    name: regression-engine
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
