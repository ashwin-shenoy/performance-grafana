# ─────────────────────────────────────────────────────────────────────────────
# PersistentVolumeClaims
# Storage class: managed-nfs-storage (IBM Fyre default)
# Override STORAGE_CLASS in deploy.sh if your Fyre cluster differs.
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: perf-testing
  labels:
    app: postgresql
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 10Gi

