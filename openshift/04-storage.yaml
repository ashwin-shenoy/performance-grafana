# ─────────────────────────────────────────────────────────────────────────────
# PersistentVolumeClaims — minimal stack (4 core + 1 JMeter RWX)
# Storage class: managed-nfs-storage (IBM Fyre default)
# Override STORAGE_CLASS in deploy.sh if your cluster differs.
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: perf-testing
  labels:
    app: postgresql
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-pvc
  namespace: perf-testing
  labels:
    app: influxdb
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 20Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: perf-testing
  labels:
    app: grafana
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 2Gi

# Shared RWX volume — JMeter controller writes results, API reads them
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jmeter-results-pvc
  namespace: perf-testing
  labels:
    app: jmeter
spec:
  accessModes: [ReadWriteMany]
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 10Gi
