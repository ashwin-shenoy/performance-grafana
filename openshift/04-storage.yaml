# Shared RWX volume for JMeter results (controller + workers both write here)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jmeter-results-pvc
  namespace: perf-testing
  labels:
    app: jmeter
spec:
  accessModes: [ReadWriteMany]
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 10Gi
