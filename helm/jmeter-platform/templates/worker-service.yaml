apiVersion: v1
kind: Service
metadata:
  name: jmeter-workers-svc
  namespace: {{ include "jmeter-platform.namespace" . }}
  labels:
    {{- include "jmeter-platform.labels" . | nindent 4 }}
    jmeter_mode: worker
spec:
  clusterIP: None
  selector:
    jmeter_mode: worker
  ports:
    - name: rmi-registry
      port: 1099
      targetPort: 1099
    - name: rmi-data
      port: 50000
      targetPort: 50000
