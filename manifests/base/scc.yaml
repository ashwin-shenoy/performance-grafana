###############################################################################
# SecurityContextConstraints — OpenShift specific
# Allows JMeter pods to run with the required permissions
# Apply with: oc apply -f scc.yaml (requires cluster-admin)
###############################################################################
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: jmeter-scc
  labels:
    app.kubernetes.io/part-of: jmeter-platform
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
fsGroup:
  type: RunAsAny
groups: []
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - ALL
runAsUser:
  type: MustRunAsRange
  uidRangeMin: 1000
  uidRangeMax: 65534
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
users: []
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
