###############################################################################
# InfluxDB — Time-series database for JMeter Backend Listener results
# Receives live test metrics via JMeter's InfluxDB Backend Listener
# Also stores Telegraf node and JVM metrics
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: jmeter-platform
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: influxdb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: influxdb
        app.kubernetes.io/component: monitoring
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 0
      containers:
        - name: influxdb
          image: influxdb:1.8
          ports:
            - containerPort: 8086
              name: http
            - containerPort: 8088
              name: rpc
          env:
            - name: INFLUXDB_DB
              valueFrom:
                secretKeyRef:
                  name: influxdb-creds
                  key: INFLUXDB_DB
            - name: INFLUXDB_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: influxdb-creds
                  key: INFLUXDB_ADMIN_USER
            - name: INFLUXDB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influxdb-creds
                  key: INFLUXDB_ADMIN_PASSWORD
            - name: INFLUXDB_HTTP_AUTH_ENABLED
              value: "true"
          volumeMounts:
            - name: influxdb-data
              mountPath: /var/lib/influxdb
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /ping
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: influxdb-data
          persistentVolumeClaim:
            claimName: influxdb-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: influxdb
    app.kubernetes.io/part-of: jmeter-platform
spec:
  selector:
    app.kubernetes.io/name: influxdb
  ports:
    - name: http
      port: 8086
      targetPort: 8086
    - name: rpc
      port: 8088
      targetPort: 8088
