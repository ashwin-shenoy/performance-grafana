###############################################################################
# PostgreSQL — Test metadata database
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-creds
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: perf-platform
type: Opaque
data:
  username: cGVyZnBsYXRmb3Jt          # perfplatform
  password: Y2hhbmdlbWUxMjM=           # changeme123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: perf-platform
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: database
    spec:
      securityContext:
        fsGroup: 26
      containers:
        - name: postgresql
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-creds
                  key: username
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-creds
                  key: password
            - name: POSTGRESQL_DATABASE
              value: "perfplatform"
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "perfplatform"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "perfplatform"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: postgresql-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data-pvc
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: perf-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/part-of: perf-platform
spec:
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - port: 5432
      targetPort: 5432
