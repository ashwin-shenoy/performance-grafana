###############################################################################
# Performance Platform — Frontend UI Deployment
# Next.js application served via nginx
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perf-platform-ui
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: perf-platform-ui
    app.kubernetes.io/part-of: perf-platform
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: perf-platform-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: perf-platform-ui
        app.kubernetes.io/component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 0
      containers:
        - name: ui
          image: registry.example.com/perf/perf-platform-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "/api/v1"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: perf-platform-ui
  namespace: perf-testing
  labels:
    app.kubernetes.io/name: perf-platform-ui
    app.kubernetes.io/part-of: perf-platform
spec:
  selector:
    app.kubernetes.io/name: perf-platform-ui
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: perf-platform
  namespace: perf-testing
  labels:
    app.kubernetes.io/part-of: perf-platform
spec:
  to:
    kind: Service
    name: perf-platform-ui
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
